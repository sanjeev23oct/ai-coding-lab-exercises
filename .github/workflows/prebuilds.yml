name: "Build Dev Container Base Image"

# Builds the shared base image (Node 22 + Claude Code pre-installed) and pushes
# to ghcr.io. All CC lab devcontainers reference this image directly via
# "image: ghcr.io/OWNER/ailab-cc-base:latest", so Codespace creation pulls the
# cached image (~15-30s) instead of running npm install at runtime (~2-3 min).

on:
  push:
    branches: [main]
    paths:
      - "labs/Dockerfile"
      - "labs/**/.devcontainer/**"
  schedule:
    # Rebuild weekly on Sunday at 3am UTC to pick up upstream base image updates
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: labs/
          file: labs/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ailab-cc-base:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ailab-cc-base:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/ailab-cc-base:buildcache,mode=max
